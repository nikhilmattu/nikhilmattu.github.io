<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="./styles.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<script src="./index.js"></script>
	</head>
<body>
  <div id="header">
    <div class="scrollable">
      <p id="marqueeTitle" class="marquee hidden">
        dreidel dreidel dreidel
      </p>
    </div>
  </div>
  <div id="content">
    <div id="gameBoard">
      <div id="turn">
      </div>
      <div id="dreidel">
        <div id="steadyState">
          <div id="steady"></div>
        </div>
        <div id="spinningState" class="hidden">
          <div id="spinning"></div>
        </div>
        <div id="spunState" class="hidden">
		<div id="result"/></div>
        </div>
      </div>
      <div id="buttonContainer">
        <button id="spinButton" class="button spinButton" type="button">Spin!<br/>🤪</button>
			</div>
    </div>
    <div id="scoreBoard">
      <table id="scoreTable" class="table">
      </table>
    </div>
  </div>
	<div class="buttonContainer">
		<button id="autoplayButton" class="button autoplayButton" type="button">Autoplay</button>
		<button id="resetButton" class="button resetButton" type="button">Restart</button>
	</div>
</body>
</html>
